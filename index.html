<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥞 pancake</title>

<style>
body {
  background: #222;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

canvas {
  background: #333;
  margin-top: 20px;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 18px;
  cursor: pointer;
}

@keyframes flash {
  0% { background: #222; }
  50% { background: #fff176; }
  100% { background: #222; }
}

.perfect {
  animation: flash 0.5s ease;
}

.flip-btn {
  margin-top: 20px;
  padding: 14px 34px;
  font-size: 18px;
  font-weight: bold;
  color: #2b1a0f;

  background: linear-gradient(145deg, #ffd38a, #ffb347);
  border: none;
  border-radius: 14px;

  box-shadow:
    0 6px 0 #c97a1a,
    0 10px 20px rgba(0,0,0,0.4);

  cursor: pointer;
  transition: all 0.12s ease;
}

.flip-btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 8px 0 #c97a1a,
    0 14px 24px rgba(0,0,0,0.45);
}

.flip-btn:active {
  transform: translateY(4px);
  box-shadow:
    0 2px 0 #c97a1a,
    0 6px 12px rgba(0,0,0,0.35);
}
</style>
</head>

<body>

<h1>🥞 팬케이크</h1>

<audio id="perfectSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<canvas id="game" width="300" height="300"></canvas><br>
<div id="ui">
  <button id="startBtn" onclick="startGame()" class="flip-btn">🥞 팬케이크 굽기</button>
  <button id="flipBtn" onclick="flip()" style="display:none;" class="flip-btn">뒤집기!</button>
  <button id="retryBtn" onclick="resetGame()" style="display:none;" class="flip-btn">🔁 다시 굽기</button>
</div>

<p id="result"></p>
<p id="bestScore">최고 점수: 0.0</p>

<script>
let gameState = "start";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bestScore = parseFloat(localStorage.getItem("pancakeBest") || 0);
document.getElementById("bestScore").innerText =
  `최고 점수: ${bestScore.toFixed(1)}`;

let time = 0;
let flipped = false;
let flipping = false;
let flipProgress = 0;
let flippedSide = false;
let scored = false;

let bounce = 0;
let bounceY = 0;
let bouncing = false;

let spots = [];
for (let i = 0; i < 8; i++) {
  spots.push({
    x: Math.random() * 60 - 30,
    y: Math.random() * 60 - 30,
    r: Math.random() * 10 + 5
  });
}

const batter = Math.random();
const water = Math.random();
const heat = 0.5 + Math.random();

function lerpColor(a, b, t) {
  const ar = parseInt(a.substr(1,2),16);
  const ag = parseInt(a.substr(3,2),16);
  const ab = parseInt(a.substr(5,2),16);

  const br = parseInt(b.substr(1,2),16);
  const bg = parseInt(b.substr(3,2),16);
  const bb = parseInt(b.substr(5,2),16);

  return `rgb(
    ${ar + (br - ar) * t},
    ${ag + (bg - ag) * t},
    ${ab + (bb - ab) * t}
  )`;
}

function getColor(progress) {
  const colors = ["#f5e6c8","#e0a96d","#8b5a2b","#2b1a0f"];
  progress = Math.min(progress, 1);

  let scaled = progress * (colors.length - 1);
  let i = Math.floor(scaled);
  let t = scaled - i;

  if (i >= colors.length - 1) return colors.at(-1);

  return lerpColor(colors[i], colors[i + 1], t);
}

function drawPancake(color, scaleY = 1) {
  let lift = flipping ? Math.sin(flipProgress * Math.PI) * 60 : 0;
  let wobbleX = 0;
  let tilt = 0;

  if (flipping && flipProgress < 0.3) {
    let t = flipProgress / 0.3;
    wobbleX = Math.sin(t * Math.PI * 4) * 6 * (1 - t);
    tilt = Math.sin(t * Math.PI * 2) * 0.1;
  }

  let squash = bouncing ? 1 - bounce * 0.2 : 1;
  let souffle = 1 + Math.sin(time * 2) * 0.02;

  ctx.save();
  ctx.translate(150 + wobbleX, 150 - lift - bounceY);

  ctx.scale(1, scaleY * squash * souffle);
  ctx.rotate(tilt);

  //뒤집기 보정
  let signY = Math.sign(scaleY) || 1;

  //자연스러운 굴곡
  ctx.lineJoin = "round";
  ctx.lineCap = "round";

  // ==========================================
  // 팬케이크 전체 두께
  // ==========================================
  ctx.fillStyle = color;

  if(signY === 1){
    // 바닥 반죽
    ctx.beginPath();
    ctx.ellipse(-2, 8 * signY, 81, 56, 0, 0, Math.PI * 2);
    ctx.fill();

    // 오른쪽 바닥 반죽
    ctx.beginPath();
    ctx.ellipse(2, 6 * signY, 80, 57, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // 바닥 반죽
    ctx.beginPath();
    ctx.ellipse(2, 8 * signY, 81, 56, 0, 0, Math.PI * 2);
    ctx.fill();

    // 오른쪽 바닥 반죽
    ctx.beginPath();
    ctx.ellipse(-2, 6 * signY, 80, 57, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // 옆면
  ctx.save();
  let sideLightGrad = ctx.createLinearGradient(0, -10 * signY, 0, 64 * signY);
  sideLightGrad.addColorStop(0, "rgba(255, 255, 255, 0)");
  sideLightGrad.addColorStop(0.6, "rgba(255, 255, 255, 0.35)"); 
  ctx.fillStyle = sideLightGrad;
  ctx.fill();

  // 그림자
  let sideShadowGrad = ctx.createLinearGradient(0, 35 * signY, 0, 64 * signY);
  sideShadowGrad.addColorStop(0, "rgba(0, 0, 0, 0)");
  sideShadowGrad.addColorStop(1, "rgba(0, 0, 0, 0.15)");
  ctx.fillStyle = sideShadowGrad;
  ctx.fill();
  ctx.restore();

  // ==========================================
  // 자연스러운 굴곡
  // ==========================================
  ctx.save();

  ctx.fillStyle = color;

  let steps = 3;
  for (let i = 1; i < steps; i++) {
    let ratio = i / steps;
    let midY = (6 * signY) * (1 - ratio); 
    let midX = (-2 * signY) * (1 - ratio); 
    
    ctx.beginPath();
    ctx.ellipse(midX, midY, 81, 53 + (3 * (1 - ratio)), 0.05 * signY * ratio, 0, Math.PI * 2);
    ctx.fill();
  }

  // 외곽 모서리에 입체 입체감
  ctx.globalCompositeOperation = "multiply";
  ctx.strokeStyle = color;
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.ellipse(0, 0, 81, 53, 0.05 * signY, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // 모서리 하이라이트
  ctx.save();
  ctx.globalCompositeOperation = "overlay";
  ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
  ctx.lineWidth = 5;
  ctx.beginPath();

  ctx.ellipse(0, 0, 80, 52, 0.05 * signY, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // ==========================================
  // 팬케이크 윗면 
  // ==========================================
  
  ctx.beginPath();
  
  ctx.ellipse(0, 0, 81, 53, 0.05 * signY, 0, Math.PI * 2);
  ctx.fillStyle = color; 
  ctx.fill();

  // 중앙 하이라이트
  ctx.save();
  ctx.globalCompositeOperation = "overlay";
  let cakeGrad = ctx.createRadialGradient(-8 * signY, -5 * signY, 8, 0, 0, 75);
  cakeGrad.addColorStop(0, "rgba(255, 248, 220, 0.45)"); 
  cakeGrad.addColorStop(0.7, "rgba(255, 255, 255, 0)");
  ctx.fillStyle = cakeGrad;
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function scoreByDistance(v, p, r) {
  return Math.max(0, 1 - Math.abs(v - p) / r);
}

function startGame() {
 gameState = "playing";

 time = 0;
 flipped = false;
 flipping = false;
 flipProgress = 0;
 flippedSide = false;
 scored = false;

 document.getElementById("startBtn").style.display = "none";
 document.getElementById("flipBtn").style.display = "inline-block";
 document.getElementById("retryBtn").style.display = "none";

  loop();
}

function resetGame() {
  gameState = "start";

  time = 0;
  flipped = false;
  flipping = false;
  flipProgress = 0;
  flippedSide = false;
  scored = false;

  document.getElementById("result").innerText = "";

  document.getElementById("startBtn").style.display = "none";

  const flipBtn = document.getElementById("flipBtn");
  flipBtn.disabled=false;
  flipBtn.style.display="inline-block";

  document.getElementById("retryBtn").style.display = "none";
  
  startGame();
 }

function loop() {
  ctx.clearRect(0, 0, 300, 300);

  let front = getColor(time);
  let back = getColor(time * 0.8);
  let color = flippedSide ? back : front;

  if (!flipping) {
    time += 0.01 * heat;
  }

  if (flipping) {
    flipProgress += 0.05;

    let scaleY = Math.cos(flipProgress * Math.PI);

    if (flipProgress > 0.5) {
      flippedSide = true;
    }

    if (flipProgress >= 1) {
      flipping = false;
      bouncing = true;
      bounce = 1;
      flipProgress = 0;
    }

    drawPancake(color, scaleY);
  } else {
    drawPancake(color, 1);
  }

  if (bouncing) {
    bounce *= 0.85;
    bounceY = Math.sin(bounce * Math.PI) * 10;

    if (bounce < 0.05) {
      bouncing = false;
      bounceY = 0;
    }
  }

  if (!flipped || flipping) {
    requestAnimationFrame(loop);
  }

  if (flipped && !flipping && !scored) {
    scored = true;

    let outside = time;
    let inside = time * (0.5 + water) / (0.5 + batter);

    let score =
      scoreByDistance(outside, 0.7, 0.4) * 40 +
      scoreByDistance(inside, 0.8, 0.4) * 40 +
      scoreByDistance(outside, 0.7, 0.2) * 20;

    score = Math.max(0, Math.min(100, score));
    score = Math.round(score * 10) / 10;

    let text = "";
    if (score > 95) {text = "👑 신의 팬케이크";
      document.getElementById("perfectSound").currentTime=0;
      document.getElementById("perfectSound").play();
    }
    else if (score > 85) {text = "🔥 거의 완벽!";}
    else if (score > 70) {text = "😋 맛있다";}
    else if (score > 50) {text = "🙂 먹을만함";}
    else if (score > 30) {text = "😐 애매함";}
    else {text = "💀 실패";}

    document.getElementById("result").innerText =
      `점수: ${score} / 100\n${text}`;

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem("pancakeBest", bestScore);

      document.getElementById("bestScore").innerText =
        `최고 점수: ${bestScore.toFixed(1)} 🔥`;
    }

    gameState = "result";

    document.getElementById("flipBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "inline-block";
  }
}

function flip() {
  if (gameState !== "playing") return;
  if (flipped) return;

  flipped = true;
  flipping = true;

  document.getElementById("flipBtn").disabled = true;
}

</script>

</body>
</html>
