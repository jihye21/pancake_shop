<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🥞 pancake</title>

<style>
body {
  background: #222;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

canvas {
  background: #333;
  margin-top: 20px;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 18px;
  cursor: pointer;
}

@keyframes flash {
  0% { background: #222; }
  50% { background: #fff176; }
  100% { background: #222; }
}

.perfect {
  animation: flash 0.5s ease;
}

.flip-btn {
  margin-top: 20px;
  padding: 14px 34px;
  font-size: 18px;
  font-weight: bold;
  color: #2b1a0f;

  background: linear-gradient(145deg, #ffd38a, #ffb347);
  border: none;
  border-radius: 14px;

  box-shadow:
    0 6px 0 #c97a1a,
    0 10px 20px rgba(0,0,0,0.4);

  cursor: pointer;
  transition: all 0.12s ease;
}

.flip-btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 8px 0 #c97a1a,
    0 14px 24px rgba(0,0,0,0.45);
}

.flip-btn:active {
  transform: translateY(4px);
  box-shadow:
    0 2px 0 #c97a1a,
    0 6px 12px rgba(0,0,0,0.35);
}
</style>
</head>

<body>

<h1>🥞 팬케이크</h1>

<audio id="perfectSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<canvas id="game" width="300" height="300"></canvas><br>
<button class="flip-btn" onclick="flip()">🥞 뒤집기</button>

<p id="result"></p>
<p id="bestScore">최고 점수: 0.0</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bestScore = parseFloat(localStorage.getItem("pancakeBest") || 0);
document.getElementById("bestScore").innerText =
  `최고 점수: ${bestScore.toFixed(1)}`;

let time = 0;
let flipped = false;
let flipping = false;
let flipProgress = 0;
let flippedSide = false;
let scored = false;

let bounce = 0;
let bounceY = 0;
let bouncing = false;

let spots = [];
for (let i = 0; i < 8; i++) {
  spots.push({
    x: Math.random() * 60 - 30,
    y: Math.random() * 60 - 30,
    r: Math.random() * 10 + 5
  });
}

const batter = Math.random();
const water = Math.random();
const heat = 0.5 + Math.random();

function lerpColor(a, b, t) {
  const ar = parseInt(a.substr(1,2),16);
  const ag = parseInt(a.substr(3,2),16);
  const ab = parseInt(a.substr(5,2),16);

  const br = parseInt(b.substr(1,2),16);
  const bg = parseInt(b.substr(3,2),16);
  const bb = parseInt(b.substr(5,2),16);

  return `rgb(
    ${ar + (br - ar) * t},
    ${ag + (bg - ag) * t},
    ${ab + (bb - ab) * t}
  )`;
}

function getColor(progress) {
  const colors = ["#f5e6c8","#e0a96d","#8b5a2b","#2b1a0f"];
  progress = Math.min(progress, 1);

  let scaled = progress * (colors.length - 1);
  let i = Math.floor(scaled);
  let t = scaled - i;

  if (i >= colors.length - 1) return colors.at(-1);

  return lerpColor(colors[i], colors[i + 1], t);
}

function drawPancake(color, scaleY = 1) {
  let lift = flipping ? Math.sin(flipProgress * Math.PI) * 40 : 0;

  let wobbleX = 0;
  let tilt = 0;

  if (flipping && flipProgress < 0.3) {
    let t = flipProgress / 0.3;
    wobbleX = Math.sin(t * Math.PI * 4) * 10 * (1 - t);
    tilt = Math.sin(t * Math.PI * 2) * 0.2;
  }

  let squash = bouncing ? 1 - bounce * 0.3 : 1;

  ctx.clearRect(0, 0, 300, 300);

  ctx.save();
  ctx.translate(150 + wobbleX, 150 - lift - bounceY);
  ctx.scale(1, scaleY * squash);

  let rotation = flipping ? flipProgress * Math.PI : 0;
  ctx.rotate(rotation + tilt);

  // 팬케이크
  ctx.beginPath();
  ctx.arc(0, 0, 80, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // 얼룩
  for (let s of spots) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fill();
  }

  ctx.restore();
}

function scoreByDistance(v, p, r) {
  return Math.max(0, 1 - Math.abs(v - p) / r);
}

function gameLoop() {
  ctx.clearRect(0, 0, 300, 300);

  let front = getColor(time);
  let back = getColor(time * 0.8);
  let color = flippedSide ? back : front;

  if (!flipping) {
    time += 0.01 * heat;
  }

  if (flipping) {
    flipProgress += 0.08;

    let scaleY = Math.cos(flipProgress * Math.PI);

    if (flipProgress > 0.5 && !flippedSide) {
      flippedSide = true;
    }

    if (flipProgress >= 1) {
      flipping = false;
      bouncing = true;
      bounce = 1;
    }

    drawPancake(color, Math.abs(scaleY));
  } else {
    drawPancake(color, 1);
  }

  if (bouncing) {
    bounce *= 0.85;
    bounceY = Math.sin(bounce * Math.PI) * 10;

    if (bounce < 0.05) {
      bouncing = false;
      bounceY = 0;
    }
  }

  if (!flipped || flipping) {
    requestAnimationFrame(gameLoop);
  }

  if (flipped && !flipping && !scored) {
    scored = true;

    let outside = time;
    let inside = time * (0.5 + water) / (0.5 + batter);

    let score =
      scoreByDistance(outside, 0.7, 0.4) * 40 +
      scoreByDistance(inside, 0.8, 0.4) * 40 +
      scoreByDistance(outside, 0.7, 0.2) * 20;

    score = Math.max(0, Math.min(100, score));
    score = Math.round(score * 10) / 10;

    let text = "";
    if (score > 95) text = "👑 신의 팬케이크";
    else if (score > 85) text = "🔥 거의 완벽!";
    else if (score > 70) text = "😋 맛있다";
    else if (score > 50) text = "🙂 먹을만함";
    else if (score > 30) text = "😐 애매함";
    else text = "💀 실패";

    document.getElementById("result").innerText =
      `점수: ${score} / 100\n${text}`;

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem("pancakeBest", bestScore);

      document.getElementById("bestScore").innerText =
        `최고 점수: ${bestScore.toFixed(1)} 🔥`;
    }
  }
}

function flip() {
  if (flipped) return;

  flipped = true;
  flipping = true;
  flipProgress = 0;
}

gameLoop();
</script>

</body>
</html>
